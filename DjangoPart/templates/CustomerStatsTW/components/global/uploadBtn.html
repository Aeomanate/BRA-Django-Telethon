<form method="post" enctype="multipart/form-data" class="w-1/2 flex items-center justify-end">
  {% csrf_token %}
  <div class="relative">
    <input
      type="file"
      name="{{ uploadFileForm.file.html_name }}"
      id="{{ uploadFileForm.file.id_for_label }}"
      class="mt-1 block w-full text-sm text-gray-300
             file:mr-4 file:rounded-lg file:border-0
             file:bg-indigo-600 file:px-4 file:py-2
             file:text-sm file:font-semibold
             hover:file:bg-indigo-700 file:cursor-pointer"
    />
    {% if uploadFileForm.file.errors %}
        <div class="absolute left-1 -bottom-7 text-sm text-red-500">
            {{ uploadFileForm.file.errors }}
        </div>
    {% else %}
    {% endif %}
  </div>
  <button type="submit" class="inline-flex gap-x-2 items-center btn-style">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5m0 0l5-5m-5 5V4"/>
    </svg>
    Завантажити
  </button>
</form>
